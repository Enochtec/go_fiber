<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3F00FF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)" fill="#fff">
    <!-- Cash register body -->
    <rect x="-80" y="20" width="160" height="70" rx="8"/>
    <rect x="-65" y="35" width="28" height="18" rx="3" fill="#3F00FF"/>
    <rect x="-30" y="35" width="28" height="18" rx="3" fill="#3F00FF"/>
    <rect x="5" y="35" width="28" height="18" rx="3" fill="#3F00FF"/>
    <rect x="40" y="35" width="28" height="18" rx="3" fill="#3F00FF"/>
    <!-- Screen -->
    <path d="M-90,20 L-90,-30 Q-90,-55 -65,-55 L65,-55 Q90,-55 90,-30 L90,20 Z"/>
    <!-- Screen display -->
    <rect x="-80" y="-45" width="160" height="60" rx="4" fill="#1e293b"/>
    <text x="0" y="-17" text-anchor="middle" font-family="system-ui" font-weight="800" font-size="28" fill="#fff">POS</text>
    <!-- Receipt coming out -->
    <rect x="-8" y="90" width="16" height="40" rx="2" fill="#fff" opacity="0.9"/>
    <line x1="-4" y1="98" x2="4" y2="98" stroke="#3F00FF" stroke-width="2" opacity="0.6"/>
    <line x1="-4" y1="104" x2="4" y2="104" stroke="#3F00FF" stroke-width="2" opacity="0.6"/>
    <line x1="-4" y1="110" x2="4" y2="110" stroke="#3F00FF" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
